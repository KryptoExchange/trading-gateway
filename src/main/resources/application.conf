ktor {
    deployment {
        port = 8090
        port = ${?GATEWAY_PORT}
    }
    application {
        modules = [ru.krypto.gateway.ApplicationKt.module]
    }
}

gateway {
    orderbook {
        host = "localhost"
        host = ${?ORDERBOOK_HOST}
        port = 8085
        port = ${?ORDERBOOK_PORT}
    }
    account {
        host = "localhost"
        host = ${?ACCOUNT_HOST}
        port = 28080
        port = ${?ACCOUNT_PORT}
    }
    apikey {
        host = "localhost"
        host = ${?APIKEY_HOST}
        port = 8093
        port = ${?APIKEY_PORT}
    }
}

kafka {
    bootstrapServers = "localhost:9092"
    bootstrapServers = ${?KAFKA_BOOTSTRAP_SERVERS}
    consumerGroupId = "trading-gateway-group"
    consumerGroupId = ${?KAFKA_CONSUMER_GROUP_ID}
    topics {
        marketState = "market-state"
        tradeOrderEvents = "trade-order-events"
        marketOhclv = "market-ohclv"
    }
}

redis {
    host = "localhost"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
}

auth {
    apiKeyCacheTtlSeconds = 300
}

rateLimit {
    requestsPerMinute = 1200
    ordersPerSecond = 50
    ordersPerDay = 100000
}

websocket {
    pingIntervalSeconds = 30
    timeoutSeconds = 60
}
